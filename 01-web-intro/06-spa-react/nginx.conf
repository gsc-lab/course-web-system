server {
    listen 80;

    # /api/ 요청 → PHP-FPM 백엔드로 전달
    location /api/ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;  # 모든 API를 단일 진입점으로
        include fastcgi_params;
    }

    # 그 외 모든 요청 → Vite 개발 서버(React SPA)로 프록시
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        # WebSocket 지원 헤더 — Vite HMR(Hot Module Replacement)에 필요
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
