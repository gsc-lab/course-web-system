# -------------------------------------------------------
# 06-spa-react: SPA(Single Page Application) + REST API 풀스택 구성
# 구성: Nginx(리버스 프록시) + Node/Vite/React(프론트엔드) + PHP-FPM(백엔드 API) + MySQL
# 흐름:
#   페이지 요청 → Nginx → Vite 개발 서버(React) → 브라우저에서 SPA 렌더링
#   API 요청  → Nginx → PHP-FPM → MySQL → JSON 응답
# Nginx가 경로에 따라 프론트엔드/백엔드 트래픽을 분기하는 리버스 프록시 역할
# -------------------------------------------------------
services:
  # Nginx: 리버스 프록시 — /api/는 PHP로, 나머지는 Vite 개발 서버로 전달
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - php

  # Vite 개발 서버: React 앱을 실시간 빌드하여 제공 (HMR 지원)
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4000"
    ports:
      - "4000:4000"                   # Vite HMR용 직접 접근 포트

  # PHP-FPM: REST API 백엔드
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: example
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
