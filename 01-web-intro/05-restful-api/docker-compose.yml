# -------------------------------------------------------
# 05-restful-api: RESTful API 설계 패턴으로 CRUD 구현
# 구성: Nginx + PHP-FPM + MySQL
# 차이점: HTTP 메서드(GET/POST/PUT/DELETE)로 자원(users)을 조작하는 REST 방식
# 흐름: 브라우저(fetch) → /api/users[/id] → Nginx → PHP 라우터 → MySQL → JSON
# -------------------------------------------------------
services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: example
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
