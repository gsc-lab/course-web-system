<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTful API + Ajax</title>
    <style>
        table { border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; }
        .actions { margin: 10px 0; }
        input { margin-right: 5px; padding: 4px; }
    </style>
</head>
<body>
    <h1>사용자 관리 (RESTful API)</h1>

    <div class="actions">
        <input type="text" id="nameInput" placeholder="이름">
        <input type="email" id="emailInput" placeholder="이메일">
        <button id="addBtn">추가</button>
    </div>

    <table>
        <thead><tr><th>ID</th><th>이름</th><th>이메일</th><th>등록일</th><th>작업</th></tr></thead>
        <tbody id="userBody"></tbody>
    </table>

    <script>
        // --- fetch API를 사용한 RESTful API 호출 ---
        // fetch()는 XMLHttpRequest를 대체하는 최신 비동기 HTTP 요청 API이다.
        // Promise 기반으로 동작하여 .then() 체이닝으로 응답을 처리한다.

        // GET /api/users — 사용자 목록 조회
        function loadUsers() {
            fetch('/api/users')
                .then(function (res) { return res.json(); })  // Response → JSON 파싱
                .then(function (users) {
                    var tbody = document.getElementById('userBody');
                    tbody.innerHTML = '';
                    users.forEach(function (u) {
                        var tr = document.createElement('tr');
                        tr.innerHTML =
                            '<td>' + u.id + '</td>' +
                            '<td>' + u.name + '</td>' +
                            '<td>' + u.email + '</td>' +
                            '<td>' + u.created_at + '</td>' +
                            '<td><button onclick="deleteUser(' + u.id + ')">삭제</button></td>';
                        tbody.appendChild(tr);
                    });
                });
        }

        // POST /api/users — 새 사용자 생성
        document.getElementById('addBtn').addEventListener('click', function () {
            var name = document.getElementById('nameInput').value;
            var email = document.getElementById('emailInput').value;
            fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },   // JSON 형식 명시
                body: JSON.stringify({ name: name, email: email })  // JS 객체 → JSON 문자열
            }).then(function () { loadUsers(); });
        });

        // DELETE /api/users/{id} — 사용자 삭제
        function deleteUser(id) {
            fetch('/api/users/' + id, { method: 'DELETE' })
                .then(function () { loadUsers(); });
        }

        // 페이지 로드 시 사용자 목록 자동 조회
        loadUsers();
    </script>
</body>
</html>
