server {
    listen 80;
    root /var/www/html;
    index index.html;              # 기본 페이지를 HTML로 설정 (SPA 스타일)

    # 정적 파일 서빙
    location / {
        try_files $uri $uri/ =404;
    }

    # /api/ 경로의 모든 요청을 단일 PHP 파일(프론트 컨트롤러)로 라우팅
    # 예: /api/users/3 → /api/index.php?/users/3
    # 이렇게 하면 PHP 내부에서 URI를 파싱하여 RESTful 라우팅을 구현할 수 있다
    location /api/ {
        try_files $uri /api/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
