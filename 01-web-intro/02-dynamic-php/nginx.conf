server {
    listen 80;
    root /var/www/html;              # 문서 루트 디렉토리
    index index.php index.html;      # 기본 파일 우선순위: PHP → HTML

    # 정적 파일 요청: 파일 존재 여부 확인 후 없으면 404
    location / {
        try_files $uri $uri/ =404;
    }

    # .php 확장자 요청을 PHP-FPM 컨테이너로 전달 (FastCGI 프록시)
    location ~ \.php$ {
        fastcgi_pass php:9000;                  # PHP-FPM 컨테이너의 FastCGI 포트
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;  # 실행할 PHP 파일 경로
        include fastcgi_params;                 # 기본 FastCGI 파라미터 포함
    }
}
