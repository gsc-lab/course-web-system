# -------------------------------------------------------
# 04-ajax-vanilla: 페이지 새로고침 없이 서버 데이터를 비동기 요청(Ajax)
# 구성: Nginx + PHP-FPM + MySQL (03과 동일)
# 차이점: 브라우저에서 XMLHttpRequest로 JSON API를 호출하여 데이터를 동적 렌더링
# 흐름: 브라우저(JS) → Ajax GET /api.php → PHP → MySQL → JSON 응답 → DOM 업데이트
# -------------------------------------------------------
services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: example
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
