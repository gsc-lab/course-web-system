# --- Nginx server 블록 (가상 호스트) ---
# 하나의 Nginx 인스턴스에서 여러 server 블록을 정의하여 다중 도메인을 처리할 수 있다.
server {
    listen 80;                          # 80번 포트에서 HTTP 요청 수신
    server_name localhost;              # 요청의 Host 헤더와 매칭할 도메인명
    root /usr/share/nginx/html;         # 문서 루트: 정적 파일이 위치한 디렉토리
    index index.html;                   # 디렉토리 접근 시 기본으로 서빙할 파일

    # --- 로그 설정 ---
    # access_log: 모든 요청 기록 (IP, 요청 경로, 응답 코드 등)
    # error_log:  오류 발생 시 기록 (설정 오류, 502 등)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --- 기본 라우팅 ---
    # try_files: 요청된 URI를 파일 → 디렉토리 → 404 순으로 시도
    location / {
        try_files $uri $uri/ =404;
    }

    # --- 정적 자원 캐시 설정 ---
    # ~* : 대소문자 무시 정규식 매칭
    # 이미지, CSS, JS 등 자주 변경되지 않는 파일에 브라우저 캐시를 설정하여 성능 향상
    location ~* \.(css|js|png|jpg|gif|ico)$ {
        expires 1d;                                     # 1일간 캐시 유효
        add_header Cache-Control "public, immutable";   # 변경 불가 캐시 힌트
    }
}
